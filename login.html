<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in & Sign up Form</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main>
      <div class="box">
        <div class="inner-box">
          <div class="forms-wrap">
            <form action="index.html" autocomplete="off" class="sign-in-form">
              <div class="logo">
                <img src="images/logo.png" alt="LearnHub" />
                <h4>LearnHub</h4>
              </div>

              <div class="heading">
                <h2>Welcome Back</h2>
                <h6>Not registred yet?</h6>
                <a href="#" class="toggle">Sign up</a>
              </div>

              <div class="actual-form">
                <div class="input-wrap">
                  <input type="text" minlength="3" class="input-field" name="roll no" placeholder="Roll No" title="Enter valid roll number" required>
                </div>

                <div class="input-wrap">
                  <input type="text" minlength="4" class="input-field" name="username" placeholder="Username" title="Enter valid Username"  required/>
                  
                </div>

                <div class="input-wrap">
                  <input type="password" minlength="4" class="input-field" name="password" placeholder="Password" title="Enter correct Password"  required />
                 
                </div>

                <input type="submit" value="Login" class="sign-btn" />

                <p class="text">
                  Forgotten your password or you login datails?
                  <a href="#">Get help</a> signing in
                </p>
              </div>
            </form>

            <form action="login.php" autocomplete="off" class="sign-up-form" method="post">
              <div class="logo">
                <img src="images/logo.png" alt="LearnHub" />
                <h4>LearnHub</h4>
              </div>

              <div class="heading">
                <h2>Get Started</h2>
                <h6>Already have an account?</h6>
                <a href="#" class="toggle">Sign in</a>
              </div>

              <div class="actual-form">
                <div class="input-wrap">
                  <input type="text" minlength="3" class="input-field" name="roll no" placeholder="Roll No" title="Enter valid roll number" required>
                </div>
                
                <div class="input-wrap">
                  <input type="text" minlength="4 to 15" class="input-field" name="name" placeholder="Full Name" autocomplete="off" title="Enter First Name and Last Name" required/> 
                </div>

                <div class="input-wrap">
                  <input type="email" class="input-field" name="email" placeholder="Email" autocomplete="off" title="Must be like : characters@characters.domain" required />
                </div>

                <div class="input-wrap">
                  <input type="text" minlength="4" class="input-field" placeholder="Username " autocomplete="off" required/>
                  
                </div>

                <div class="input-wrap">
                  <input type="password" minlength="4" class="input-field" name="password" placeholder="Password" autocomplete="off" title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters" required /> 
                </div>

                <div class="input-wrap">
                  <input type="password" class="input-field" name="confirm password" placeholder="Confirm Password" onkeyup="check();" required>
                </div>


                <input type="submit" value="Sign Up" class="sign-btn" />
              </div>
            </form>
          </div>

          <div class="carousel">
            <div class="images-wrapper">
              <img src="images/login.png" class="image img-1 show" alt="" />
            </div>

            <div class="text-slider">
              <div class="text-wrap">
                <div class="text-group">
                  <h2>Invite students to your class</h2>
                </div>
              </div>

              <div class="bullets">
                <span class="active" data-value="1"></span>
                <span data-value="2"></span>
                <span data-value="3"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>
      const inputs = document.querySelectorAll("input-field");
      const toggle_btn=document.querySelectorAll(".toggle");
      const main=document.querySelector("main");
  
            var check = function() {
                if (document.getElementById("password").value == document.getElementById("confirm_password").value) {
                    document.getElementById("message").style.color = "green";
                    document.getElementById("message").innerHTML = "Password matched!";
                } else {
                    document.getElementById("message").style.color = "red";
                    document.getElementById("message").innerHTML = "Password does not match!";
                }
            }

      inputs.forEach((inp) => {
        inp.addEventListener("focus",() => {
          inp.classList.add("active");
        });
        inp.addEventListener("blur", () => {
          if(inp.value != "") return;
          inp.classList.remove("active");
        });
      });

      toggle_btn.forEach((btn) => {
        btn.addEventListener("click", () =>{
          main.classList.toggle("sign-up-mode");
        });
      });
    </script>
  </body>
</html>
